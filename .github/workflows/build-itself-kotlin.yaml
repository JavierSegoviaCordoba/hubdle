name: build-itself-kotlin

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'

  workflow_dispatch:

jobs:
  build:
    uses: JavierSegoviaCordoba/reusable-workflows/.github/workflows/build-itself-kotlin.yaml@34fd38844e1c27ceddc6f62d257f50a690843c22 # main
    with:
      tag-prefix: 'p'
      restore-kotlin-native-cache: false
      run_before_args: './gradlew assemble publishToMavenLocalTest'
    secrets: inherit
