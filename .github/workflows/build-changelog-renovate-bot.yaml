name: build-changelog-renovate-bot

on:
  push:
    branches:
      - 'renovate/**'

jobs:
  add-updated-dependencies-to-changelog:
    uses: JavierSegoviaCordoba/reusable-workflows/.github/workflows/build-changelog-renovate-bot.yaml@34fd38844e1c27ceddc6f62d257f50a690843c22 # main
    with:
      auto-approve: false
      gradle-args: '-Phubdle.catalog.renovate=true'
      restore-kotlin-native-cache: false
      tag-prefix: 'c'
    secrets: inherit
